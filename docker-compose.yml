---
services:
  nextcloud-exporter:
    build: .
    image: pva1:5000/nextcloud_exporter
    container_name: nextcloud-exporter
    hostname: sv-cloud
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "9206:9206"
    environment:
      - NEXTCLOUD_URL
      - NEXTCLOUD_AUTH_TOKEN=clI7dLVJ7y21xgYYlWFchVeODdiGPfSDIp4ROK4F7gCxot2Tfv1lEzihVYocnNc8ujrgUJPw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9206/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  monitoring:
    driver: bridge
    name: monitoring
